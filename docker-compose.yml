# Локальная инфраструктура для разработки: Postgres + Redis.
# Запуск:  docker compose up -d
# Остановка: docker compose down   (данные сохраняются в volume pgdata)
services:
  postgres:
    image: postgres:16
    container_name: dp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: design_power
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dp-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
